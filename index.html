<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | EMERALD ELITE 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        :root { --emerald: #00ff88; --glow: 0 0 20px rgba(0, 255, 136, 0.4); }
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* تأثير الخلفية المتحركة */
        .bg-glow { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #002211 0%, #000 100%); z-index: -1; opacity: 0.6; }

        header { height: 80px; background: rgba(0,0,0,0.8); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(0,255,136,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 28px; color: var(--emerald); text-shadow: var(--glow); cursor: pointer; }

        /* شريط القصص الجديد */
        .stories-bar { display: flex; gap: 15px; overflow-x: auto; padding: 100px 20px 20px; width: 100%; scrollbar-width: none; }
        .story-circle { min-width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--emerald); padding: 3px; cursor: pointer; transition: 0.3s; }
        .story-circle img, .story-circle video { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .story-circle:active { transform: scale(0.9); }

        .feed { display: flex; flex-direction: column; align-items: center; gap: 40px; padding-bottom: 100px; }
        
        /* كارت الفيديو المطور */
        .v-card { width: 92%; max-width: 500px; border-radius: 40px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; transition: 0.5s; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .v-card:hover { border-color: var(--emerald); transform: scale(1.02); }

        video { width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #000; max-height: 70vh; }

        .live-pulse { position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron'; color: var(--emerald); border: 1px solid var(--emerald); }
        .dot { width: 6px; height: 6px; background: var(--emerald); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .action-btns { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        .side-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .side-btn i { font-size: 20px; }
        .side-btn span { font-size: 10px; font-weight: bold; margin-top: 2px; }

        .comment-area { padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .c-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,136,0.2); border-radius: 25px; padding: 12px 20px; color: #fff; outline: none; }

        .btn-float { position: fixed; bottom: 30px; left: 30px; width: 65px; height: 65px; background: var(--emerald); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 2000; box-shadow: 0 0 30px var(--emerald); border: none; }
        
        footer { padding: 40px; text-align: center; background: #000; border-top: 1px solid rgba(0,255,136,0.1); }
        .p-date { font-family: 'Orbitron'; color: var(--emerald); font-size: 12px; letter-spacing: 5px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <div class="logo italic" id="admin-trigger">XRAWS</div>
        <div class="text-[10px] text-gray-500 font-bold tracking-widest">EMERALD ELITE</div>
    </header>

    <div class="stories-bar" id="story-line"></div>

    <main class="feed" id="main-feed"></main>

    <footer>
        <div class="logo text-xl mb-4">XRAWS</div>
        <div class="p-date">PRODUCTION DATE: 2026</div>
    </footer>

    <button class="btn-float" id="up-btn"><i class="fas fa-plus"></i></button>

    <script>
        const CONFIG = {
            db: "https://soko-7d03e-default-rtdb.firebaseio.com/",
            cloud: "dfscughol",
            preset: "update_vk",
            ads: ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"]
        };

        firebase.initializeApp({ databaseURL: CONFIG.db });
        const db = firebase.database();
        let adStep = 0;

        function openAd() { window.open(CONFIG.ads[adStep], '_blank'); adStep = (adStep+1)%2; }

        const widget = cloudinary.createUploadWidget({
            cloudName: CONFIG.cloud, uploadPreset: CONFIG.preset, resourceType: 'video'
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('xraws_elite/').push({ url: res.info.secure_url, likes: Math.floor(Math.random()*50), time: Date.now() });
            }
        });

        document.getElementById("up-btn").onclick = () => widget.open();

        db.ref('xraws_elite').on('value', (snap) => {
            const feed = document.getElementById('main-feed');
            const stories = document.getElementById('story-line');
            const data = snap.val();
            feed.innerHTML = ''; stories.innerHTML = '';

            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                
                // إضافة للقصص
                stories.innerHTML += `<div class="story-circle" onclick="document.getElementById('${id}').scrollIntoView({behavior:'smooth'})"><video src="${item.url}"></video></div>`;

                // إضافة للفيد
                feed.innerHTML += `
                    <div class="v-card" id="${id}">
                        <div class="live-pulse"><div class="dot"></div> LIVE VIEWERS: ${Math.floor(Math.random()*200)+50}</div>
                        <video loop playsinline src="${item.url}" controls></video>
                        
                        <div class="action-btns">
                            <div class="side-btn" onclick="handleLike('${id}')"><i class="fas fa-heart text-red-500"></i><span id="l-${id}">${item.likes || 0}</span></div>
                            <div class="side-btn" onclick="openAd()"><i class="fas fa-comment text-emerald-400"></i><span>12</span></div>
                            <div class="side-btn" onclick="openAd(); window.open('${item.url}','_blank')"><i class="fas fa-download text-white"></i><span>SAVE</span></div>
                        </div>

                        <div class="comment-area">
                            <div class="text-[11px] text-gray-400 mb-3" id="c-list-${id}"></div>
                            <input type="text" class="c-input" placeholder="Say something..." onkeydown="if(event.key==='Enter') addC('${id}', this.value); if(event.key==='Enter') this.value=''">
                        </div>
                    </div>`;
                loadC(id);
            });
        });

        function addC(id, txt) { if(!txt.trim()) return; openAd(); db.ref(`xraws_elite/${id}/comments`).push({t: txt}); }
        function loadC(id) {
            db.ref(`xraws_elite/${id}/comments`).on('value', s => {
                const list = document.getElementById(`c-list-${id}`);
                const data = s.val(); list.innerHTML = '';
                if(data) Object.values(data).slice(-2).forEach(c => { list.innerHTML += `<div class="mb-1"><span class="text-emerald-500">User:</span> ${c.t}</div>`; });
            });
        }
        function handleLike(id) { openAd(); db.ref(`xraws_elite/${id}/likes`).transaction(l => (l || 0) + 1); }
    </script>
</body>
</html>
